<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقييم التشابه البصري</title>
<style>
  :root {
    --navy: #1B3A6B;
    --navy-dark: #0D1F3C;
    --green: #2ECC71;
    --amber: #F1C40F;
    --red: #E74C3C;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: white;
  }
  .container {
    max-width: 720px;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 13px; color: #A8C4E8; }
  .progress-bar {
    width: 100%; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 8px; overflow: hidden; margin: 20px 0;
  }
  .progress-fill { height: 100%; background: var(--green); border-radius: 8px; transition: width 0.4s ease; }
  .progress-text { text-align: center; font-size: 13px; color: #A8C4E8; margin-bottom: 20px; }
  .query-section { text-align: center; margin-bottom: 24px; }
  .query-label { font-size: 13px; color: #A8C4E8; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px; }
  .query-img {
    width: 160px; height: 160px; border-radius: 16px; object-fit: cover;
    border: 3px solid #E8700A; box-shadow: 0 8px 24px rgba(232,112,10,0.3);
  }
  .question-text { text-align: center; font-size: 17px; font-weight: 600; margin: 20px 0; color: white; }
  .options-row { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
  .option-card {
    flex: 1; max-width: 220px; background: rgba(255,255,255,0.06);
    border-radius: 16px; padding: 12px; cursor: pointer;
    border: 3px solid transparent; transition: all 0.2s ease; text-align: center;
  }
  .option-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .option-card.selected { border-color: var(--green); background: rgba(46,204,113,0.15); }
  .option-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
  .option-label { font-weight: 700; font-size: 16px; color: white; }
  .extra-options { display: flex; flex-direction: column; gap: 10px; max-width: 340px; margin: 0 auto 20px; }
  .neither-btn {
    display: block; width: 100%; padding: 14px;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: #A8C4E8; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease;
  }
  .neither-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
  .neither-btn.selected { border-color: var(--amber); background: rgba(241,196,15,0.15); color: var(--amber); }
  .both-btn {
    display: block; width: 100%; padding: 14px;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: #A8C4E8; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease;
  }
  .both-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
  .both-btn.selected { border-color: var(--green); background: rgba(46,204,113,0.15); color: var(--green); }
  .next-btn {
    display: block; width: 100%; padding: 16px; background: var(--green); border: none;
    border-radius: 12px; color: var(--navy-dark); font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease; opacity: 0.4; pointer-events: none;
  }
  .next-btn.enabled { opacity: 1; pointer-events: auto; }
  .next-btn.enabled:hover { background: #27AE60; transform: translateY(-1px); }
  .next-btn:disabled { opacity: 0.6; pointer-events: none; }
  .loading, .thank-you { text-align: center; padding: 60px 20px; }
  .loading .spinner {
    width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
    border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .thank-you h2 { font-size: 26px; margin-bottom: 14px; }
  .thank-you p { font-size: 15px; color: #A8C4E8; line-height: 1.8; margin-bottom: 24px; }
  .thank-you .checkmark { font-size: 56px; margin-bottom: 16px; }
  .continue-btn {
    padding: 14px 32px; background: rgba(255,255,255,0.08); border: 2px solid var(--green);
    border-radius: 12px; color: var(--green); font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all 0.2s ease;
  }
  .continue-btn:hover { background: rgba(46,204,113,0.15); }
  .no-more-note { font-size: 13px; color: #A8C4E8; margin-top: 16px; }
  .intro-screen { text-align: center; padding: 20px 0; }
  .intro-screen h2 { font-size: 20px; margin-bottom: 16px; }
  .intro-screen p { font-size: 14px; color: #A8C4E8; line-height: 1.9; margin-bottom: 20px; }
  .start-btn {
    padding: 16px 40px; background: var(--green); border: none; border-radius: 12px;
    color: var(--navy-dark); font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .start-btn:hover { background: #27AE60; }
  .sending-note { text-align:center; font-size:12px; color:#6b8fc7; margin-top:8px; height:16px; }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <p>...جارٍ التحميل</p>
  </div>
</div>

const NUM_QUESTIONS_PER_ROUND = 10;
const GAS_URL = "https://script.google.com/macros/s/AKfycbxBIiFhcR4y-SMMvKelwR-PiI5iCsl-OGbFI9eJVxtf5zDuT-OiCZtNgzh8PU3drYsY/exec";
const STORAGE_KEY_ANSWERED = 'llm_v2_answered_question_ids';
const STORAGE_KEY_ROUND    = 'llm_v2_round_number';
const STORAGE_KEY_DEVICE   = 'llm_v2_device_id';

let myQuestions = [];
let currentIndex = 0;
let currentSelection = null;
let deviceId = null;
let sessionId = null;
let roundNumber = 1;

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getDeviceId() {
  let id = localStorage.getItem(STORAGE_KEY_DEVICE);
  if (!id) {
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(STORAGE_KEY_DEVICE, id);
  }
  return id;
}

function generateSessionId() {
  return 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

function getAnsweredIds() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_ANSWERED);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveAnsweredIds(ids) {
  try {
    localStorage.setItem(STORAGE_KEY_ANSWERED, JSON.stringify(ids));
  } catch (e) {}
}

function getRoundNumber() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_ROUND);
    return raw ? parseInt(raw, 10) : 1;
  } catch (e) { return 1; }
}

function saveRoundNumber(n) {
  try {
    localStorage.setItem(STORAGE_KEY_ROUND, String(n));
  } catch (e) {}
}

function init() {
  deviceId = getDeviceId();
  roundNumber = getRoundNumber();
  renderIntro();
}

function renderIntro() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <h1>تقييم التشابه البصري بين الوجوه</h1>
    </div>
    <div class="intro-screen">
      <h2>مرحباً بك</h2>
      <p>
        سيتم عرض ${NUM_QUESTIONS_PER_ROUND} أسئلة بسيطة عليك.<br>
        يحتوي كل سؤال على صورة لشخص، وصورتين لشخصين آخرين (أ وب).<br>
        يُرجى اختيار الشخص الأكثر تشابهاً بصرياً مع الشخص الظاهر في الصورة الأولى.<br>
        وفي حال عدم وضوح التشابه، أو تشابه كليهما معه، تتوفر خيارات إضافية لذلك.
      </p>
      <button class="start-btn" onclick="startQuiz()">ابدأ التقييم</button>
    </div>
  `;
}

function startQuiz() {
  sessionId = generateSessionId();
  const answeredIds = getAnsweredIds();
  const availableQuestions = ALL_QUESTIONS.filter(q => !answeredIds.includes(q.question_id));

  if (availableQuestions.length === 0) {
    renderNoMoreQuestions();
    return;
  }

  const shuffledIds = shuffle(availableQuestions.map(q => q.question_id));
  const selectedIds = shuffledIds.slice(0, NUM_QUESTIONS_PER_ROUND);
  myQuestions = selectedIds.map(qid => ALL_QUESTIONS.find(q => q.question_id === qid));
  currentIndex = 0;
  renderQuestion();
}

function renderNoMoreQuestions() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <h1>تقييم التشابه البصري بين الوجوه</h1>
    </div>
    <div class="thank-you">
      <div class="checkmark">🙏</div>
      <h2>شكراً جزيلاً</h2>
      <p>لقد قمت بالإجابة على جميع الأسئلة المتاحة حالياً.<br>نقدّر وقتك ومساهمتك القيّمة.</p>
    </div>
  `;
}

function renderQuestion() {
  const q = myQuestions[currentIndex];
  currentSelection = null;

  const app = document.getElementById('app');
  const progressPct = Math.round((currentIndex / myQuestions.length) * 100);

  app.innerHTML = `
    <div class="header">
      <h1>تقييم التشابه البصري بين الوجوه</h1>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="progress-text">السؤال ${currentIndex + 1} من ${myQuestions.length}</div>

    <div class="query-section">
      <div class="query-label">هذا الشخص 👇</div>
      <img class="query-img" src="${q.query_url}" alt="query" />
    </div>

    <div class="question-text">من الأكثر تشابهاً معه من بين الاثنين؟</div>

    <div class="options-row">
      <div class="option-card" id="optA" onclick="selectOption('A')">
        <img src="${q.option_a_url}" alt="الخيار أ" />
        <div class="option-label">أ</div>
      </div>
      <div class="option-card" id="optB" onclick="selectOption('B')">
        <img src="${q.option_b_url}" alt="الخيار ب" />
        <div class="option-label">ب</div>
      </div>
    </div>

    <div class="extra-options">
      <button class="neither-btn" id="optNeither" onclick="selectOption('neither')">
        لا أحد منهما يشبهه / غير متأكد
      </button>
      <button class="both-btn" id="optBoth" onclick="selectOption('both')">
        كلاهما يشبهه
      </button>
    </div>

    <button class="next-btn" id="nextBtn" onclick="submitAnswer()">التالي</button>
    <div class="sending-note" id="sendingNote"></div>
  `;
}

function selectOption(choice) {
  currentSelection = choice;
  document.getElementById('optA').classList.toggle('selected', choice === 'A');
  document.getElementById('optB').classList.toggle('selected', choice === 'B');
  document.getElementById('optNeither').classList.toggle('selected', choice === 'neither');
  document.getElementById('optBoth').classList.toggle('selected', choice === 'both');
  document.getElementById('nextBtn').classList.add('enabled');
}

function submitAnswer() {
  if (!currentSelection) return;

  const q = myQuestions[currentIndex];
  // اختيار "كلاهما يشبهه" يُسجَّل كتحقق صحيح لاختيار النموذج (true)
  const isModelCorrect = (currentSelection === q.correct_side) || (currentSelection === 'both');

  const response = {
    question_id: q.question_id,
    user_choice: currentSelection,
    correct_side: q.correct_side,
    model_was_chosen: isModelCorrect,
    model_score: q.model_score,
    opponent_score: q.opponent_score,
    opponent_rank: q.opponent_rank,
    device_id: deviceId,
    session_id: sessionId,
    round_number: roundNumber,
  };

  const nextBtn = document.getElementById('nextBtn');
  const note = document.getElementById('sendingNote');
  nextBtn.disabled = true;
  if (note) note.textContent = 'جارٍ الحفظ...';

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(response),
  }).catch(() => {}).finally(() => {
    const answeredIds = getAnsweredIds();
    if (!answeredIds.includes(q.question_id)) {
      answeredIds.push(q.question_id);
      saveAnsweredIds(answeredIds);
    }

    currentIndex++;
    if (currentIndex >= myQuestions.length) {
      roundNumber++;
      saveRoundNumber(roundNumber);
      renderThankYou();
    } else {
      renderQuestion();
    }
  });
}

function renderThankYou() {
  const answeredIds = getAnsweredIds();
  const remainingCount = ALL_QUESTIONS.filter(q => !answeredIds.includes(q.question_id)).length;

  const app = document.getElementById('app');
  const continueSection = remainingCount > 0
    ? `<button class="continue-btn" onclick="startQuiz()">أرغب بمتابعة ${Math.min(NUM_QUESTIONS_PER_ROUND, remainingCount)} أسئلة إضافية</button>`
    : `<p class="no-more-note">لقد تمت الإجابة على جميع الأسئلة المتاحة. شكراً لمساهمتك الكاملة.</p>`;

  app.innerHTML = `
    <div class="header">
      <h1>تقييم التشابه البصري بين الوجوه</h1>
    </div>
    <div class="thank-you">
      <div class="checkmark">✅</div>
      <h2>شكراً لك</h2>
      <p>تم تسجيل إجاباتك بنجاح.<br>نقدّر وقتك ومساهمتك القيّمة.</p>
      ${continueSection}
    </div>
  `;
}

init();
</script>

</html>
